<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192">
  <rect width="192" height="192" fill="#0a0605"/>
  <rect x="8" y="8" width="176" height="176" fill="none" stroke="#6b4f1a" stroke-width="3"/>
  <rect x="12" y="12" width="168" height="168" fill="none" stroke="#c4991e" stroke-width="1"/>
  <!-- Skull -->
  <circle cx="96" cy="82" r="52" fill="#6b0000"/>
  <circle cx="96" cy="82" r="50" fill="#8b1a1a"/>
  <!-- Eye sockets -->
  <ellipse cx="80" cy="76" rx="13" ry="14" fill="#0a0605"/>
  <ellipse cx="112" cy="76" rx="13" ry="14" fill="#0a0605"/>
  <!-- Pupils / glow -->
  <ellipse cx="80" cy="76" rx="7" ry="8" fill="#c41e1e" opacity="0.6"/>
  <ellipse cx="112" cy="76" rx="7" ry="8" fill="#c41e1e" opacity="0.6"/>
  <!-- Nose -->
  <ellipse cx="96" cy="96" rx="7" ry="5" fill="#0a0605"/>
  <!-- Jaw -->
  <rect x="62" y="112" width="68" height="26" rx="6" fill="#8b1a1a"/>
  <!-- Teeth -->
  <rect x="66"  y="114" width="10" height="14" rx="2" fill="#0a0605"/>
  <rect x="80"  y="114" width="10" height="14" rx="2" fill="#0a0605"/>
  <rect x="94"  y="114" width="10" height="14" rx="2" fill="#0a0605"/>
  <rect x="108" y="114" width="10" height="14" rx="2" fill="#0a0605"/>
  <!-- Crown horns -->
  <polygon points="70,32 78,62 62,62" fill="#c4991e"/>
  <polygon points="96,24 104,58 88,58" fill="#c4991e"/>
  <polygon points="122,32 130,62 114,62" fill="#c4991e"/>
  <!-- Gold ring -->
  <circle cx="96" cy="82" r="54" fill="none" stroke="#c4991e" stroke-width="2"/>
