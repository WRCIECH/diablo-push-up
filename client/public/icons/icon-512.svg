  <rect x="243" y="303" width="28" height="38" rx="4" fill="#0a0605"/>
  <rect x="281" y="303" width="28" height="38" rx="4" fill="#0a0605"/>
  <rect x="319" y="303" width="28" height="38" rx="4" fill="#0a0605"/>
